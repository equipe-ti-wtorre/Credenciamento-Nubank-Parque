<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Credenciamento — login Teams</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }
      .box {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
      }
      .err {
        color: #fcd34d;
        font-size: 0.9rem;
        max-width: 28rem;
        white-space: pre-wrap;
      }
    </style>
    <script src="/auth/vendor/MicrosoftTeams.min.js"></script>
    <script src="/auth/vendor/msal-browser.min.js"></script>
  </head>
  <body>
    <div class="box">
      <div>
        <p>Autenticando no Microsoft 365…</p>
        <p id="status" class="err" hidden></p>
      </div>
    </div>
    <script>
      (function () {
        /**
         * Máquina fria (Teams desktop): sessionStorage pode se perder ao ir/voltar
         * do login.microsoftonline.com. Por isso:
         * - MSAL cache em localStorage
         * - Flag do popup em cookie + localStorage
         * - redirectUri = /auth/teams.html (retorno direto, sem bounce no Angular)
         */
        var POPUP_FLAG = "teams.auth.popup";
        var COOKIE = "teams_auth_popup";
        var REDIRECT_PATH = "/auth/teams.html";
        var statusEl = document.getElementById("status");

        function showError(msg) {
          statusEl.hidden = false;
          statusEl.textContent = msg;
        }

        function setPopupFlag() {
          try {
            localStorage.setItem(POPUP_FLAG, "1");
          } catch (_) {}
          try {
            sessionStorage.setItem(POPUP_FLAG, "1");
          } catch (_) {}
          try {
            document.cookie =
              COOKIE + "=1; path=/; max-age=900; SameSite=Lax";
          } catch (_) {}
        }

        function clearPopupFlag() {
          try {
            localStorage.removeItem(POPUP_FLAG);
          } catch (_) {}
          try {
            sessionStorage.removeItem(POPUP_FLAG);
          } catch (_) {}
          try {
            document.cookie =
              COOKIE + "=; path=/; max-age=0; SameSite=Lax";
          } catch (_) {}
        }

        function fail(msg) {
          showError(msg);
          clearPopupFlag();
          try {
            microsoftTeams.authentication.notifyFailure(String(msg));
          } catch (_) {}
        }

        function clearMsalInteraction() {
          try {
            for (var store of [sessionStorage, localStorage]) {
              for (var i = store.length - 1; i >= 0; i--) {
                var k = store.key(i);
                if (
                  k &&
                  (k.indexOf("interaction.status") >= 0 ||
                    k.indexOf("request.params") >= 0 ||
                    k.indexOf("request.state") >= 0 ||
                    k.indexOf("request.nonce") >= 0 ||
                    k.indexOf("request.origin") >= 0)
                ) {
                  store.removeItem(k);
                }
              }
            }
          } catch (_) {}
        }

        function isAzureReturn() {
          return /(?:^|[?#&])(code|id_token|error)=/i.test(
            window.location.search + window.location.hash
          );
        }

        function succeed(token) {
          clearPopupFlag();
          microsoftTeams.authentication.notifySuccess(token);
        }

        async function main() {
          if (!window.microsoftTeams || !window.msal) {
            throw new Error("Bibliotecas Teams/MSAL não carregaram.");
          }

          await microsoftTeams.app.initialize();

          var redirectUri = window.location.origin + REDIRECT_PATH;

          var cfgRes = await fetch("/api/v1/tenants/msal-config", {
            credentials: "same-origin",
          });
          if (!cfgRes.ok) {
            throw new Error("Não foi possível obter a configuração MSAL.");
          }
          var cfg = await cfgRes.json();
          if (!cfg.clientId) {
            throw new Error("Client ID Microsoft não configurado.");
          }

          var pca = new msal.PublicClientApplication({
            auth: {
              clientId: cfg.clientId,
              authority:
                cfg.authority || "https://login.microsoftonline.com/common",
              redirectUri: redirectUri,
              postLogoutRedirectUri: redirectUri,
              navigateToLoginRequestUrl: false,
            },
            cache: {
              // localStorage sobrevive ao hop Azure→Teams desktop melhor que sessionStorage
              cacheLocation: "localStorage",
            },
          });
          await pca.initialize();

          var redirected;
          try {
            redirected = await pca.handleRedirectPromise();
          } catch (redirErr) {
            var reMsg =
              (redirErr && redirErr.message) ||
              "Falha no retorno do Microsoft.";
            if (/AADSTS50011|redirect_uri|reply url/i.test(reMsg)) {
              reMsg =
                "Redirect URI não cadastrado no Azure.\n\nCadastre como SPA:\n" +
                redirectUri +
                "\n" +
                window.location.origin;
            }
            fail(reMsg);
            return;
          }

          if (redirected && (redirected.idToken || redirected.accessToken)) {
            succeed(redirected.idToken || redirected.accessToken);
            return;
          }

          if (isAzureReturn()) {
            fail(
              "Retorno Microsoft sem token.\nCadastre SPA:\n" +
                redirectUri +
                "\ne tente de novo."
            );
            return;
          }

          var params = new URLSearchParams(window.location.search);
          var loginHint = params.get("login_hint") || undefined;

          try {
            var ctx = await microsoftTeams.app.getContext();
            if (!loginHint && ctx && ctx.user) {
              loginHint =
                ctx.user.loginHint || ctx.user.userPrincipalName || undefined;
            }
          } catch (_) {}

          var accounts = pca.getAllAccounts();
          if (accounts && accounts.length) {
            try {
              var silent = await pca.acquireTokenSilent({
                account: accounts[0],
                scopes: ["openid", "profile", "User.Read"],
                redirectUri: redirectUri,
              });
              succeed(silent.idToken || silent.accessToken);
              return;
            } catch (_) {}
          }

          clearMsalInteraction();
          setPopupFlag();

          var loginReq = {
            scopes: ["openid", "profile", "User.Read"],
            redirectUri: redirectUri,
          };
          if (loginHint) loginReq.loginHint = loginHint;
          await pca.loginRedirect(loginReq);
        }

        main().catch(function (err) {
          fail((err && err.message) || String(err));
        });
      })();
    </script>
  </body>
</html>
