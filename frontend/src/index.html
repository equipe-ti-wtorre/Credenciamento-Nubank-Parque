<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Credenciamento</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Popup Teams: se Azure devolver no origin, manda para /auth/teams.html antes do Angular. -->
    <script>
      (function () {
        try {
          var flag =
            sessionStorage.getItem('teams.auth.popup') === '1' ||
            localStorage.getItem('teams.auth.popup') === '1' ||
            /(?:^|;\s*)teams_auth_popup=1(?:;|$)/.test(document.cookie || '');
          if (!flag) return;
          var q = location.search || '';
          var h = location.hash || '';
          if (!/(?:^|[?#&])(code|id_token|error)=/i.test(q + h)) return;
          if (location.pathname.indexOf('/auth/teams') === 0) return;
          location.replace('/auth/teams.html' + q + h);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
